name: Deploy to Server

on:
  push:
    branches: [ main ]
  workflow_dispatch:  # позволяет запускать вручную из интерфейса GitHub

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup SSH
      run: |
        mkdir -p ~/.ssh/
        echo "${{ secrets.SERVER_SSH_KEY }}" > ~/.ssh/deploy_key
        chmod 600 ~/.ssh/deploy_key
        cat >> ~/.ssh/config << EOF
        Host server
          HostName ${{ secrets.SERVER_HOST }}
          User ${{ secrets.SERVER_USER }}
          IdentityFile ~/.ssh/deploy_key
          IdentitiesOnly yes
          StrictHostKeyChecking no
        EOF
    
    - name: Deploy to server
      run: |
        # Клонируем или обновляем репозиторий
        ssh server "cd ~/football-bot && git pull origin main || git clone https://github.com/cooN4i/fantasyxi.git ~/football-bot"
        
        # Создаем виртуальное окружение (если его нет)
        ssh server "cd ~/football-bot && python3 -m venv venv"
        
        # Устанавливаем зависимости
        ssh server "cd ~/football-bot && source venv/bin/activate && pip install --upgrade pip && pip install -r requirements.txt"
        
        # Останавливаем старый процесс
        ssh server "screen -S football-bot -X quit || true"
        
        # Запускаем бота в новой screen-сессии
        ssh server "cd ~/football-bot && screen -dmS football-bot bash -c 'source venv/bin/activate && python3 bot.py'"
    
    - name: Wait for bot to start
      run: sleep 5
    
    - name: Check health
      run: |
        ssh server "curl -s http://localhost:10000/health || echo '⚠️ Health check failed, but deployment completed'"
    
    - name: Verify bot is running
      run: |
        ssh server "screen -ls | grep football-bot && echo '✅ Bot is running' || echo '⚠️ Bot may not be running'"