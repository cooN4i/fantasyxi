name: Deploy to Server

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup SSH
      run: |
        mkdir -p ~/.ssh/
        echo "${{ secrets.SERVER_SSH_KEY }}" > ~/.ssh/deploy_key
        chmod 600 ~/.ssh/deploy_key
        cat >> ~/.ssh/config << EOF
        Host server
          HostName ${{ secrets.SERVER_HOST }}
          User ${{ secrets.SERVER_USER }}
          IdentityFile ~/.ssh/deploy_key
          IdentitiesOnly yes
          StrictHostKeyChecking no
        EOF
    
    - name: Deploy and restart bot
      run: |
        ssh server << 'ENDSSH'
          set -e
          
          echo "Entering project directory..."
          cd ~/fantasyxi
          
          echo "Pulling latest code..."
          git pull origin main
          
          echo "Fixing permissions for nginx..."
          chown -R www-data:www-data /root/fantasyxi
          chmod 755 /root
          
          echo "Activating virtualenv..."
          source venv/bin/activate
          
          echo "Installing dependencies..."
          pip install -r requirements.txt --no-cache-dir
          
          echo "Restarting service..."

          sudo systemctl daemon-reload
          sudo systemctl restart fantasyxi

          echo "Waiting for service to start..."
          sleep 3

          echo "Health check..."
          curl -f http://localhost:10000/health
          
          echo "Service status:"
          sudo systemctl status fantasyxi --no-pager
        ENDSSH
    
    - name: Verify deployment
      run: |
        echo "Deployment completed successfully!"
        echo "Bot is live at: https://fantasyxi.abrdns.com"