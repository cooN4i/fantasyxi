name: Deploy to Server

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup SSH
      run: |
        mkdir -p ~/.ssh/
        echo "${{ secrets.SERVER_SSH_KEY }}" > ~/.ssh/deploy_key
        chmod 600 ~/.ssh/deploy_key
        cat >> ~/.ssh/config << EOF
        Host server
          HostName ${{ secrets.SERVER_HOST }}
          User ${{ secrets.SERVER_USER }}
          IdentityFile ~/.ssh/deploy_key
          IdentitiesOnly yes
          StrictHostKeyChecking no
        EOF
    
    - name: Deploy and restart bot
      run: |
        ssh server << 'ENDSSH'
          set -e
          
          cd ~/football-bot
          
          git pull origin main
          
          source venv/bin/activate
          pip install --upgrade pip
          pip install -r requirements.txt
          
          sudo systemctl restart fantasyxi
          
          sleep 3
          
          sudo systemctl status fantasyxi --no-pager
          
          curl -s http://localhost:10000/health && echo " ✅ Bot is healthy" || echo " ❌ Health check failed"
        ENDSSH
    
    - name: Verify webhook
      run: |
        ssh server "curl -s 'https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/getWebhookInfo' | python3 -c 'import sys,json; d=json.load(sys.stdin); print(\"✅ Webhook URL:\", d[\"result\"][\"url\"])'"